<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Focus App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; color: #333; }
        #forest { width: 100%; height: 400px; background-image: url('forest.png'); background-size: cover; position: relative; }
        .tree { position: absolute; bottom: 0; }
        .stats, .controls { margin: 20px; }
    </style>
</head>
<body>
    <h1>Forest Focus App</h1>
    <div id="forest"></div>
    <div class="controls">
        <button onclick="startFocusSession()">Start Focus Session</button>
        <button onclick="endFocusSession()">End Session</button>
    </div>
    <div class="stats">
        <h2>Statistics</h2>
        <p>Focus Time: <span id="focus-time">0</span> minutes</p>
        <p>Coins: <span id="coins">0</span></p>
    </div>
    <script>
        let focusTime = 0;
        let coins = 0;
        let focusInterval;

        function startFocusSession() {
            focusTime = 0;
            coins += 10; // Earn coins for starting a session
            updateStats();
            focusInterval = setInterval(() => {
                focusTime++;
                updateStats();
                if (focusTime % 5 === 0) growTree();
            }, 60000); // Increment focus time every minute
        }

        function endFocusSession() {
            clearInterval(focusInterval);
        }

        function growTree() {
            const tree = document.createElement('img');
            tree.src = 'tree.png';
            tree.className = 'tree';
            tree.style.left = `${Math.random() * 100}%`;
            document.getElementById('forest').appendChild(tree);
        }

        function updateStats() {
            document.getElementById('focus-time').textContent = focusTime;
            document.getElementById('coins').textContent = coins;
        }
    </script>
</body>
</html>
