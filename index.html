<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest-Style Productivity App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; color: #333; }
        #app { max-width: 800px; margin: auto; padding: 20px; }
        .tree { width: 100px; height: 150px; fill: green; }
        .statistics { margin-top: 20px; }
        .badge { display: inline-block; margin: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Forest-Style Productivity App</h1>
        <svg width="200" height="200">
            <circle class="tree" cx="100" cy="150" r="40" />
        </svg>
        <div>
            <label for="timer">Custom Timer:</label>
            <input type="text" id="timer" placeholder="Enter time in minutes">
        </div>
        <div class="statistics">
            <h2>Weekly Stats</h2>
            <div id="stats-chart">[Chart goes here]</div>
        </div>
        <div>
            <button id="focusMusic">Play Focus Music</button>
        </div>
        <div class="badges">
            <h2>Achievement Badges</h2>
            <div class="badge">🌳 10 Trees Planted</div>
            <div class="badge">🏆 Focus Master</div>
        </div>
        <div class="notifications">
            <h2>Notifications</h2>
            <ul id="notificationList"></ul>
        </div>
        <div class="coin-system">
            <h2>Coins: <span id="coinCount">0</span></h2>
        </div>
    </div>
    <script>
        // JavaScript for interactive features could go here
    </script>
</body>
</html>
