<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Productivity App</title>
    <style>
        body { font-family: Arial, sans-serif; background: url('https://example.com/nature-background.jpg'); background-size: cover; color: white; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .timer { font-size: 48px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; } 
        /* Additional styles */
    </style>
</head>
<body>
    <div class="container">
        <h1>Forest Productivity App</h1>
        <div class="timer" id="timer">00:00:00</div>
        <button id="startTimer">Start</button>
        <button id="stopTimer">Stop</button>
        <button id="resetTimer">Reset</button>
        <h2>Achievements</h2>
        <div id="achievements"></div>
    </div>
    <script>
        let timerInterval;
        let elapsedTime = 0;
        const achievements = [];

        function startTimer() {
            timerInterval = setInterval(() => {
                elapsedTime++;
                document.getElementById('timer').innerText = formatTime(elapsedTime);
                // Implement coin system and achievements here
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            elapsedTime = 0;
            document.getElementById('timer').innerText = formatTime(elapsedTime);
        }

        function formatTime(seconds) {
            const hours = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const sec = String(seconds % 60).padStart(2, '0');
            return `${hours}:${minutes}:${sec}`;
        }

        document.getElementById('startTimer').addEventListener('click', startTimer);
        document.getElementById('stopTimer').addEventListener('click', stopTimer);
        document.getElementById('resetTimer').addEventListener('click', resetTimer);

        // Local storage functionality for saving achievements and timer state
    </script>
</body>
</html>
